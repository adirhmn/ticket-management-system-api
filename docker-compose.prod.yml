name: ticket-management-system-api


services:
  db:
    image: postgres:15-alpine
    container_name: ticket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tickets}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Note: No ports mapped publicly. Kept secure and private within the bridge network.

  web:
    build: .
    container_name: ticket_api
    restart: unless-stopped
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"

    ports:
      # Bind only to host loopback interface to prevent bypassing the Nginx reverse proxy
      - "127.0.0.1:8000:8000"
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tickets}
      API_KEY: ${API_KEY}
    depends_on:
      - db


volumes:
  postgres_data:
