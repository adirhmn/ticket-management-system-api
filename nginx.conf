# Rate limiting: 10 requests/second per IP, with burst tolerance of 20
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name _; # Matches all domain names / IPs

    # Hide Nginx version from response headers to prevent version fingerprinting
    server_tokens off;

    # Access and Error logs configuration
    access_log /var/log/nginx/ticket_api_access.log;
    error_log /var/log/nginx/ticket_api_error.log warn;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Maximum upload size
    client_max_body_size 10M;

    location / {
        # Apply rate limiting
        limit_req zone=api burst=20 nodelay;

        # Forward requests to the FastAPI application running locally
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Connection settings
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
